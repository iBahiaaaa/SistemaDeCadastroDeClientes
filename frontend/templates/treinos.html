<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/treinos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme_toggle.css') }}">
</head>

<body>
    {% include 'components/header.html' %}
    <main>
        {% include 'components/sidebar.html' %}

        <section id="conteudoGeral">
            <section class="topoPagina">
                <div>
                    <h1>Treinos</h1>
                </div>
            </section>

            <section class="pesquisaAluno">
                <input type="text" id="pesquisaAluno" placeholder="Pesquisar aluno...">
            </section>

            <section class="cardAluno">
                <div class="cardAlunoCabecalho">
                    <div>
                        <h2>João Silva</h2>
                        <span>Hipertrofia • Intermediário • 5x Semana</span>
                    </div>
                    <div class="acoesAluno">
                        <button class="btnGerar">Gerar Treino</button>
                        <button class="btnEditar">Editar</button>
                    </div>
                </div>
            </section>

            <section class="listaTreinos">
                <article class="cardTreino">
                    <h3>Treino A</h3>
                    <span>Peito e Tríceps</span>
                    <p>5 exercícios</p>
                </article>
                <article class="cardTreino">
                    <h3>Treino B</h3>
                    <span>Costas e Bíceps</span>
                    <p>5 exercícios</p>
                </article>
                <article class="cardTreino">
                    <h3>Treino C</h3>
                    <span>Pernas</span>
                    <p>6 exercícios</p>
                </article>
                <article class="cardTreino">
                    <h3>Treino D</h3>
                    <span>Ombros</span>
                    <p>4 exercícios</p>
                </article>
            </section>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/components/theme-toggle.js') }}"></script>
</body>

</html>
