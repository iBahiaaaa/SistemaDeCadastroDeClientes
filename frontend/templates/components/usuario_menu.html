<style>
    .usuarioMenu {
        position: relative;
    }

    .usuarioMenu::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 100%;
        height: 12px;
    }

    .usuarioMenu-botao {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    padding: 8px 10px;
    color: var(--texto);
    cursor: pointer;
    text-shadow: var(--sombraTexto);
    margin: 10px 30px 0 0;
}

    .usuarioMenu-botao i {
        font-size: 0.85em;
        opacity: 0.85;
        transition: transform 0.3s ease;
        transform-origin: 50% 50%;
    }

    .usuarioMenu:hover .usuarioMenu-botao i,
    .usuarioMenu.aberto .usuarioMenu-botao i,
    .usuarioMenu:focus-within .usuarioMenu-botao i {
        transform: rotate(180deg);
    }

    .usuarioMenu-dropdown {
    position: absolute;
    top: 100%;
    right: 30px;
    width: 150px;
    background-color: var(--cor2);
    border: 1px solid var(--bordaSuave);
    border-radius: 12px;
    box-shadow: var(--sombra);
    padding: 8px;
    display: none;
    z-index: 20;
    margin: 5px 0 0 0;
}

    .usuarioMenu:hover .usuarioMenu-dropdown,
    .usuarioMenu:focus-within .usuarioMenu-dropdown,
    .usuarioMenu.aberto .usuarioMenu-dropdown {
        display: block;
    }

    .usuarioMenu-item {
        display: block;
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        color: var(--texto);
    }

    .usuarioMenu-item:hover {
        color: var(--texto);
        background-color: var(--cor4);
    }

    .usuarioMenu-sair {
        color: var(--texto);
    }

    #usuarioMenu-sair:hover {
        color: var(--texto);
        background-color: red;
    }
</style>

<div class="usuarioMenu">
    <button class="usuarioMenu-botao" type="button">
        Olá, {{ usuario_nome or 'Usuário' }}
        <i class="fa-solid fa-chevron-down"></i>
    </button>
    <div class="usuarioMenu-dropdown">
        <a class="usuarioMenu-item" href="/perfil">Meu Perfil</a>
        <a class="usuarioMenu-item usuarioMenu-sair" id="usuarioMenu-sair" href="/logout">Sair / Deslogar</a>
    </div>
</div>
