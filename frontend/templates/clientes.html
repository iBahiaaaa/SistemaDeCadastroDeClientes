<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/clientes.css') }}">
    <link rel="shortcut icon" href="../static/imagens/person_add.svg" type="image/x-icon">
</head>

<body>
    <header>
        <section id="cabeca">

        </section>
    </header>
    <main>
        <section id="barraLateral">
            <div>
                <h1 id="paginaAtual"><img src="../static/imagens/group.svg" alt="Clientes">Clientes</h1>
                <h1><img src="../static/imagens/card.svg" alt="Planos">Planos</h1>
                <h1><img src="../static/imagens/money.svg" alt="Pagamentos">Pagamentos</h1>
                <h1><img src="../static/imagens/warning.svg" alt="Inadimplência">Inadimplência</h1>
                <h1><img src="../static/imagens/halter.svg" alt="Treinos">Treinos</h1>
                <h1><img src="../static/imagens/prancheta.svg" alt="Avaliação">Avaliação</h1>
                <h1><img src="../static/imagens/personCheck.svg" alt="Frequência">Frequência</h1>
                <h1><img src="../static/imagens/work.svg" alt="Funcionários">Funcionários</h1>
                <h1><img src="../static/imagens/relatorios.svg" alt="Relatórios">Relatórios</h1>
                <h1><img src="../static/imagens/settings.svg" alt="Configuração">Configuração</h1>
            </div>
            <div id="sairLateral">
                <h1><img src="../static/imagens/sair.svg" alt="Sair">Sair</h1>
            </div>
        </section>
        <section id="conteudoGeral">
            <section id="cadastroClientes">
        <div id="divTituloListaClientes">
            <h2 id="tituloListaClientes">Clientes Cadastrados</h2>
            <div id="pesquisaEBotao">
                <input type="text" id="pesquisaClientes" placeholder="Pesquise por nome, whatsapp, endereço, plano, status...">
                <button title="Cadastrar novo cliente" id="botaoCadastrar" type="submit">
                    <img src="../static/imagens/person_add.svg" alt="">
                    <span>Cadastrar cliente</span>
                </button>
            </div>
        </div>
    </section>
            <div id="conteudoTabelaListaClientes">
                <table id="tabelaListaClientes">
                    <thead id="cabecaTabelaClientes">
                        <tr>
                            <th id="colNome">Nome</th>
                            <th id="colWhatsapp">Whatsapp</th>
                            <th id="colMatricula">Matricula</th>
                            <th id="colPlano">Plano</th>
                            <th id="colVencimento">Vencimento</th>
                            <th id="colStatus">Status</th>
                            <th>Observações</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelaListaClientes">
            </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer>
    </footer>
    <section id="modalCadastro">
        <div id="caixaModal">
            <h2 id="modalTitulo">Cadastrar Cliente</h2>
            <form action="/cadastrar" method="POST">
                <input type="hidden" name="id_cliente" id="id_cliente">
                <div class="modal-row">
                    <input type="text" id="modalNome" name="nome" placeholder="Nome do aluno*" required>
                    <input type="tel" id="modalWhatsapp" name="whatsapp" placeholder="Whatsapp">
                </div>
                <div class="modal-row">
                    <input type="text" id="modalEndereco" name="endereco" placeholder="Endereço">
                    <input type="text" id="modalEmergencia" name="contato_emergencia"
                        placeholder="Contato de Emergência">
                    <span id="linkWppEmergencia" style="display: none;"><a
                            href="#"
                            target="_blank" class="whatsapp-link" onclick="event.stopPropagation();"
                            title="Conversar no WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a></span>
                </div>
                <div class="modal-row">
                    <input type="text" id="modalPlano" name="plano" placeholder="Plano (ex: Mensal)">
                    <input type="text" id="modalValorPlano" name="valor_plano" placeholder="Valor do Plano">
                    <select id="modalPeriodoPlano" name="periodo_plano">
                        <option value="mensal">Mensal</option>
                        <option value="trimestral">Trimestral</option>
                        <option value="semestral">Semestral</option>
                        <option value="anual">Anual</option>
                    </select>
                    <select id="modalStatus" name="status">
                        <option value="Pago">Pago</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Inadimplente">Inadimplente</option>
                    </select>
                </div>
                <div class="modal-row">
                    <div class="input-group">
                        <label for="modalMatricula">Data Matricula</label>
                        <input type="date" id="modalMatricula" name="data_matricula">
                    </div>
                    <div class="input-group">
                        <label for="modalUltimoPagamento">Último Pagamento</label>
                        <input type="date" id="modalUltimoPagamento" name="ultimo_pagamento" disabled>
                    </div>
                    <div class="input-group" style="display: flex; align-items: flex-end; gap: 10px;">
                        <div style="flex: 1;">
                            <label for="modalVencimento">Data Vencimento</label>
                            <input type="date" id="modalVencimento" name="data_vencimento">
                        </div>
                        <button type="button" id="btnConfirmarPagamento" title="Confirmar Pagamento" style="margin-bottom: 0; background-color: #2bff00; color: #171b20; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer;">
                            <i class="fa-solid fa-check"></i>
                        </button>
                    </div>
                </div>
                <textarea id="modalObservacoes" name="observacoes" placeholder="Observações"></textarea>
                <div id="botoesModal">
                    <button type="button" id="btnExcluirModal" class="btnExcluir"
                        style="display: none;">Excluir</button>
                    <div id="botoesDireitaModal">
                        <button type="submit" id="btnSalvar">Salvar</button>
                        <button type="button" id="btnCancelar">Fechar</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <form id="formExcluirOculto" method="POST" style="display: none;">
    </form>
    <form id="formPagamentoOculto" method="POST" style="display: none;">
    </form>
    <section id="overlayModal">
        </section>
        <script src="{{ url_for('static', filename='js/clientes.js') }}"></script>
        <script>
            // Inicializa a tabela com os clientes do servidor ao carregar a página
            document.addEventListener('DOMContentLoaded', function() {
                let clientesIniciais = {{ clientes | tojson | safe }};
                // Garante que seja sempre um array
                if (!Array.isArray(clientesIniciais)) {
                    clientesIniciais = [];
                }
                renderizarTabelaClientes(clientesIniciais);
            });
        </script>
    </body>
</html>
